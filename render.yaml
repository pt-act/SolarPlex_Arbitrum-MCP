services:
  - type: web
    name: solarplex-arbitrum-mcp
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run http
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ARBITRUM_RPC_URL
        sync: false
      - key: ARBITRUM_SEPOLIA_RPC_URL
        sync: false
      - key: QUICKNODE_SOLANA_ENDPOINT
        sync: false
      - key: QUICKNODE_ARBITRUM_ENDPOINT
        sync: false
      - key: QUICKNODE_API_KEY
        sync: false
