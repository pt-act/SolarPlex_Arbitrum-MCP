<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolarPlex MCP — Terminal Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
  }
  .terminal-window {
    width: 960px;
    background: #1a1b26;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
  }
  .terminal-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: #16161e;
    border-bottom: 1px solid #292e42;
  }
  .dots { display: flex; gap: 8px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red { background: #ff5f57; }
  .dot.yellow { background: #febc2e; }
  .dot.green { background: #28c840; }
  .title {
    flex: 1;
    text-align: center;
    color: #565f89;
    font-size: 13px;
  }
  .terminal-body {
    padding: 20px;
    min-height: 520px;
    max-height: 520px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.7;
    color: #a9b1d6;
  }
  .terminal-body::-webkit-scrollbar { width: 6px; }
  .terminal-body::-webkit-scrollbar-track { background: transparent; }
  .terminal-body::-webkit-scrollbar-thumb { background: #292e42; border-radius: 3px; }
  .prompt { color: #7aa2f7; }
  .cmd { color: #9ece6a; }
  .url { color: #f7768e; }
  .flag { color: #bb9af7; }
  .str { color: #73daca; }
  .key { color: #7dcfff; }
  .num { color: #ff9e64; }
  .comment { color: #565f89; font-style: italic; }
  .highlight { color: #73daca; font-weight: 600; }
  .hash { color: #e0af68; word-break: break-all; }
  .error { color: #f7768e; }
  .success { color: #73daca; }
  .response-block {
    margin: 8px 0 16px 0;
    padding: 12px;
    background: #13141c;
    border-radius: 6px;
    border-left: 3px solid #292e42;
  }
  .response-label {
    color: #565f89;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .cursor {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: #7aa2f7;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .typing { overflow: hidden; white-space: nowrap; }
  .section-divider {
    margin: 16px 0;
    padding: 8px 0;
    border-top: 1px solid #292e42;
    color: #565f89;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-left: 8px;
  }
  .badge.live { background: #73daca20; color: #73daca; border: 1px solid #73daca40; }
  .badge.signed { background: #e0af6820; color: #e0af68; border: 1px solid #e0af6840; }
  .badge.formula { background: #bb9af720; color: #bb9af7; border: 1px solid #bb9af740; }
</style>
</head>
<body>

function jsonToHtml(obj, indent = 0) {
  const pad = '  '.repeat(indent);
  const pad1 = '  '.repeat(indent + 1);
  const lines = [];

  if (Array.isArray(obj)) {
    if (obj.length === 0) return '[]';
    lines.push('[');
    obj.forEach((item, i) => {
      const comma = i < obj.length - 1 ? ',' : '';
      if (typeof item === 'object' && item !== null) {
        lines.push(pad1 + jsonToHtml(item, indent + 1) + comma);
      } else if (typeof item === 'string') {
        lines.push(pad1 + `<span class="str">"${item}"</span>` + comma);
      } else if (typeof item === 'number') {
        lines.push(pad1 + `<span class="num">${item}</span>` + comma);
      } else if (typeof item === 'boolean') {
        lines.push(pad1 + `<span class="${item ? 'success' : 'error'}">${item}</span>` + comma);
      }
    });
    lines.push(pad + ']');
    return lines.join('\n');
  }

  if (typeof obj !== 'object' || obj === null) return String(obj);

  const keys = Object.keys(obj);
  lines.push('{');
  keys.forEach((key, i) => {
    const comma = i < keys.length - 1 ? ',' : '';
    const val = obj[key];
    if (typeof val === 'string') {
      if (val.startsWith('0x') && val.length > 20) {
        lines.push(pad1 + `<span class="key">"${key}"</span>: <span class="hash">"${val}"</span>${comma}`);
      } else if (val.startsWith('http')) {
        lines.push(pad1 + `<span class="key">"${key}"</span>: <span class="url">"${val}"</span>${comma}`);
      } else if (val.includes('×') || val.includes('√')) {
        lines.push(pad1 + `<span class="key">"${key}"</span>: <span class="highlight">"${val}"</span>${comma}`);
      } else {
        lines.push(pad1 + `<span class="key">"${key}"</span>: <span class="str">"${val}"</span>${comma}`);
      }
    } else if (typeof val === 'number') {
      lines.push(pad1 + `<span class="key">"${key}"</span>: <span class="num">${val}</span>${comma}`);
    } else if (typeof val === 'boolean') {
      lines.push(pad1 + `<span class="key">"${key}"</span>: <span class="${val ? 'success' : 'error'}">${val}</span>${comma}`);
    } else if (typeof val === 'object' && val !== null) {
      lines.push(pad1 + `<span class="key">"${key}"</span>: ${jsonToHtml(val, indent + 1)}${comma}`);
    }
  });
  lines.push(pad + '}');
  return lines.join('\n');
}

function cmdToHtml(cmd) {
  return cmd
    .replace(/(curl)/g, '<span class="cmd">$1</span>')
    .replace(/(-s|-X POST|-H|-d)/g, '<span class="flag">$1</span>')
    .replace(/(https?:\/\/[^\s\\"]+)/g, '<span class="url">$1</span>')
    .replace(/("Content-Type: application\/json")/g, '<span class="str">$1</span>');
}

async function typeText(element, text, speed = 8) {
  return new Promise(resolve => {
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    element.appendChild(cursor);

    function type() {
      if (i < text.length) {
        const char = text[i];
        if (char === '\n') {
          element.insertBefore(document.createElement('br'), cursor);
        } else {
          element.insertBefore(document.createTextNode(char), cursor);
        }
        i++;
        setTimeout(type, speed);
      } else {
        cursor.remove();
        resolve();
      }
    }
    type();
  });
}

async function runDemo() {
  for (const step of steps) {
    if (step.type === 'comment') {
      const div = document.createElement('div');
      div.innerHTML = `<span class="comment">${step.text}</span>`;
      terminal.appendChild(div);
      await sleep(200);
    } else if (step.type === 'divider') {
      const div = document.createElement('div');
      div.className = 'section-divider';
      div.textContent = step.text;
      terminal.appendChild(div);
      await sleep(400);
    } else if (step.type === 'command') {
      // Prompt line
      const promptDiv = document.createElement('div');
      promptDiv.innerHTML = `<span class="prompt">❯</span> `;
      terminal.appendChild(promptDiv);

      // Type the command
      const cmdSpan = document.createElement('span');
      promptDiv.appendChild(cmdSpan);
      await typeText(cmdSpan, step.cmd, 6);

      // Response
      await sleep(300);
      const respDiv = document.createElement('div');
      respDiv.className = 'response-block';
      respDiv.innerHTML = `<div class="response-label">${step.response.label}</div><pre style="margin:0;white-space:pre-wrap;word-break:break-all;">${jsonToHtml(step.response.json)}</pre>`;
      terminal.appendChild(respDiv);

      terminal.scrollTop = terminal.scrollHeight;
      await sleep(600);
    }
  }
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// Start demo after a brief delay
setTimeout(runDemo, 500);
</script>

</html>
